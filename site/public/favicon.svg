<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- One abacus rod: frame, beam, a heaven bead above and earth beads below.
       Deep purple matches the app icon (scripts/generate_icon.py). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B62D9"/>
      <stop offset="1" stop-color="#5B3C99"/>
    </linearGradient>
  </defs>
  <rect x="8" y="6" width="48" height="52" rx="10" fill="url(#bg)"/>
  <line x1="32" y1="12" x2="32" y2="52" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="14" y1="27" x2="50" y2="27" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="32" cy="20" rx="8" ry="5.5" fill="#FFFFFF"/>
  <ellipse cx="32" cy="36" rx="8" ry="5.5" fill="#FFFFFF"/>
  <ellipse cx="32" cy="47" rx="8" ry="5.5" fill="#FFFFFF" opacity="0.55"/>
</svg>
