name: CI

# Every branch and PR: the engine + session test suites (the SAME named suites
# release.yml runs), via salpa so the commands live in ONE place (salpa.yaml).
# Releases (signed dmg) happen in release.yml when main moves.
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  packages: read # pull salpa from ghcr

jobs:
  test:
    name: Engine tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      # PickleKit (BDD test dependency) needs Swift 6.2+.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa

      # PICKLE_REPORT enables PickleKit's Cucumber-style HTML report; it covers
      # the Gherkin scenarios and is uploaded as a build artifact below (even
      # when tests fail — that's when it's most useful). salpa runs the command
      # in a shell that inherits this env, so the report vars reach swift test.
      - name: Run the engine suite
        run: salpa test engine
        env:
          PICKLE_REPORT: "1"
          PICKLE_REPORT_PATH: ${{ github.workspace }}/gherkin-report-engine.html

      - name: Upload Gherkin HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gherkin-report-engine
          path: gherkin-report-engine.html
          if-no-files-found: warn

  build:
    name: App compiles + session tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      # The app icon is generated by a pre-build script (scripts/generate_icon.py);
      # the PNGs are gitignored, so a clean checkout needs Pillow to build.
      - name: Install Pillow (app icon generation)
        run: python3 -m pip install --quiet --break-system-packages Pillow

      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa

      # `salpa test session` runs `xcodegen generate && xcodebuild test …
      # CODE_SIGNING_ALLOWED=NO` (see salpa.yaml). xcodebuild only forwards env
      # vars carrying the TEST_RUNNER_ prefix to the test process — that's how
      # PICKLE_REPORT reaches PickleKit; salpa inherits this step's env.
      - name: Build and run session Gherkin tests (unsigned)
        run: salpa test session
        env:
          TEST_RUNNER_PICKLE_REPORT: "1"
          TEST_RUNNER_PICKLE_REPORT_PATH: ${{ github.workspace }}/gherkin-report-session.html

      - name: Upload session Gherkin HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gherkin-report-session
          path: gherkin-report-session.html
          if-no-files-found: warn
