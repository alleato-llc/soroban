name: CI

# The ONE always-running CI workflow: every job below starts on every PR and
# every push to main, and a paths-filter step (the `changes` job) decides
# whether it does real work or reports instantly. This replaces the old
# quartet (ci.yml [swift], rust-ci.yml, ts-ci.yml, site-ci.yml) whose
# workflow-level path gates meant a check simply NEVER REPORTED on a PR that
# didn't touch its paths — leaving branch protection's required checks
# "Expected" forever and every such merge needing an admin bypass.
#
# The gate is the single `ci-passed` job at the bottom: it always runs and is
# the ONLY branch-protection-required check. Each real job below stays
# cheaply SKIPPABLE (dorny/paths-filter + a job-level `if`) so a site-only PR
# never spins up a macOS runner; `ci-passed` needs them all with `if:
# always()` and fails only if one genuinely FAILED (a skipped dependency is
# fine). This is robust where the earlier "a skipped required check counts as
# passing" was not — a skipped MATRIX job never even creates its per-OS
# contexts (cargo test (ubuntu-latest)/(macos-14)), so requiring those names
# directly left the merge BLOCKED forever.
#
# Releases are separate: release.yml (macOS) and release-rust.yml run on
# path-gated pushes to main; deploy-site.yml ships site/**.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read # pull salpa from ghcr (the Swift jobs)

# One live run per ref — a newer push cancels the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which components changed, so each job below runs only when
  # relevant. A change to the shared spec (spec/**) or to this workflow
  # re-runs every engine suite — spec/** is the parity oracle all three
  # runners execute. The site job keys on site/** (it tests the VENDORED
  # wasm on purpose) plus this workflow.
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      rust: ${{ steps.filter.outputs.rust }}
      ts: ${{ steps.filter.outputs.ts }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            spec: &spec
              - 'spec/**'
              - '.github/workflows/ci.yml'
            swift:
              - *spec
              - 'swift/**'
            rust:
              - *spec
              - 'rust/**'
            ts:
              - *spec
              - 'ts/**'
              - 'rust/anzan/**'
              - 'rust/wasm/**'
            site:
              - '.github/workflows/ci.yml'
              - 'site/**'

  # ---- Swift ---------------------------------------------------------------
  # The engine + session test suites (the SAME named suites release.yml runs),
  # via salpa so the commands live in ONE place (salpa.yaml).

  engine:
    name: Engine tests
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      # PickleKit (BDD test dependency) needs Swift 6.2+.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa

      # PICKLE_REPORT enables PickleKit's Cucumber-style HTML report; it covers
      # the Gherkin scenarios and is uploaded as a build artifact below (even
      # when tests fail — that's when it's most useful). salpa runs the command
      # in a shell that inherits this env, so the report vars reach swift test.
      - name: Run the engine suite
        run: salpa test engine
        working-directory: swift # salpa.yaml + the SwiftPM package live here
        env:
          PICKLE_REPORT: "1"
          PICKLE_REPORT_PATH: ${{ github.workspace }}/gherkin-report-engine.html

      - name: Upload Gherkin HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gherkin-report-engine
          path: gherkin-report-engine.html
          if-no-files-found: warn

  session:
    name: App compiles + session tests
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      # The app icon is generated by a pre-build script (scripts/generate_icon.py);
      # the PNGs are gitignored, so a clean checkout needs Pillow to build.
      - name: Install Pillow (app icon generation)
        run: python3 -m pip install --quiet --break-system-packages Pillow

      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa

      # `salpa test session` runs `xcodegen generate && xcodebuild test …
      # CODE_SIGNING_ALLOWED=NO` (see salpa.yaml). xcodebuild only forwards env
      # vars carrying the TEST_RUNNER_ prefix to the test process — that's how
      # PICKLE_REPORT reaches PickleKit; salpa inherits this step's env.
      - name: Build and run session Gherkin tests (unsigned)
        run: salpa test session
        working-directory: swift # salpa.yaml + project.yml live here
        env:
          TEST_RUNNER_PICKLE_REPORT: "1"
          TEST_RUNNER_PICKLE_REPORT_PATH: ${{ github.workspace }}/gherkin-report-session.html

      - name: Upload session Gherkin HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gherkin-report-session
          path: gherkin-report-session.html
          if-no-files-found: warn

  # ---- Rust ----------------------------------------------------------------
  # fmt + clippy + unit tests + the shared Gherkin suite (spec/anzan through
  # cucumber-rs — the parity oracle the Swift engine also runs). Two OSes
  # deliberately: the anzan crate promises platform-independent results
  # (pure-Rust libm at the via_double seam), and running Linux and macOS side
  # by side keeps that claim honest.

  rust:
    name: cargo test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Gherkin parity suite (spec/anzan)
        run: cargo test --test gherkin -p soroban-engine

  # ---- TypeScript / WASM ---------------------------------------------------
  # typecheck + vitest (binding surface) + the shared Gherkin suite
  # (spec/anzan through cucumber-js — the THIRD parity runner, guarding the
  # JS binding/marshalling layer). Unlike the site (which uses the VENDORED
  # wasm in ts/wasm and site/src/wasm), this job builds the nodejs wasm
  # itself so a rust/anzan change can never test against a stale binary —
  # which is also why rust/anzan/** and rust/wasm/** are in the ts filter.

  ts:
    name: npm test + spec (ubuntu-latest)
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - name: Install
        working-directory: ts
        run: npm ci
      - name: Build wasm (fresh — never test against a stale vendored binary)
        working-directory: ts
        run: npm run build:wasm
      - name: Typecheck
        working-directory: ts
        run: npm run typecheck
      - name: Build
        working-directory: ts
        run: npm run build
      - name: Unit tests (binding surface)
        working-directory: ts
        run: npm test
      - name: Shared spec (cucumber-js — the third parity runner)
        working-directory: ts
        run: npm run spec

  # ---- Site ----------------------------------------------------------------
  # Playwright (chromium) drives the live REPL island — the "Live · try it"
  # hero build — against the real static build (`npm run build && npm run
  # preview`, via playwright.config.ts's webServer). Island WIRING only
  # (hydration, menu bar, mode badge, panels, the carousel handoff); language
  # behavior is covered by the three spec runners, never here. Uses the
  # VENDORED wasm (site/src/wasm) on purpose — the smoke test is exactly what
  # catches a broken or stale vendored binary.

  site:
    name: playwright (ubuntu-latest)
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        working-directory: site
        run: npm ci
      - name: Install chromium
        working-directory: site
        run: npx playwright install chromium --with-deps
      - name: UI tests (the live REPL island)
        working-directory: site
        run: npm run test:ui
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7

  # ---- The gate ------------------------------------------------------------
  # The ONLY branch-protection-required check. It always runs (cheap, ubuntu)
  # and needs every real job with `if: always()`, so it reports even when some
  # of them skipped. It FAILS only if a dependency genuinely failed or was
  # cancelled — a skipped dependency (its paths didn't change) is a pass. This
  # is what lets a partial-path PR (site-only, docs-only, .claude-only) merge
  # on a green gate without spinning up the macOS runners, and without the
  # per-OS matrix-context reporting gap that blocked the direct-require setup.
  ci-passed:
    name: CI passed
    needs: [changes, engine, session, rust, ts, site]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require no failure among the suites
        run: |
          results='${{ join(needs.*.result, ",") }}'
          echo "dependency results: $results"
          case "$results" in
            *failure*|*cancelled*)
              echo "::error::a CI suite failed or was cancelled"; exit 1;;
            *) echo "all suites passed or were skipped";;
          esac
