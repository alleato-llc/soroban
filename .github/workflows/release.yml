name: Release

# Gitflow-style: every push to main IS a release. salpa
# (github.com/alleato-llc/salpa, pulled from ghcr) owns the lifecycle —
# `salpa test <suite>` runs a named test suite, `salpa version` computes the
# next semver (patch by default; #minor/#major in the head commit bumps
# bigger), `salpa build` imports the Developer ID cert and produces a SIGNED +
# NOTARIZED Soroban-X.Y.Z.dmg (parameterised by salpa.yaml), `salpa publish`
# cuts the GitHub release (the tag) and attaches the dmg + a versionless
# Soroban.dmg (the stable latest-download).
#
# The GitHub Release is the point of truth for downloads — no cloud here.
#
# Required repository secrets (see docs/RELEASING.md):
#   BUILD_CERTIFICATE_BASE64    Developer ID Application cert+key (.p12, base64)
#   P12_PASSWORD                the p12's password
#   APPLE_TEAM_ID               10-character team id
#   APPLE_ID                    Apple ID email (notarization)
#   APPLE_APP_SPECIFIC_PASSWORD app-specific password (notarization)
on:
  push:
    branches: [main]

permissions:
  contents: write # gh release create (creates the tag) + uploads the dmg
  packages: read # pull salpa from ghcr

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Engine tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode # PickleKit (BDD dependency) needs Swift 6.2+
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"
      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa
      - name: Run the engine suite
        run: salpa test engine # cd Engine && swift test
        working-directory: swift

  session-tests:
    name: Session Gherkin tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"
      # salpa's session suite shells `xcodegen generate` (project.yml repo) and
      # the icon pre-build script needs Pillow — both must be on the runner.
      - name: Install XcodeGen + Pillow
        run: |
          brew install xcodegen
          python3 -m pip install --quiet --break-system-packages Pillow
      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa
      - name: Run the session suite
        run: salpa test session # xcodegen generate && xcodebuild test … CODE_SIGNING_ALLOWED=NO
        working-directory: swift

  release:
    name: Sign, notarize, publish (salpa)
    needs: [test, session-tests]
    runs-on: macos-26
    outputs:
      version: ${{ steps.rel.outputs.version }} # the tag is v$version — desktop jobs attach to it
    env:
      GH_TOKEN: ${{ github.token }} # salpa publish → gh release create
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # tags drive `salpa version`

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      # salpa shells `xcodegen generate` (project.yml repo) and the icon
      # pre-build script needs Pillow — both must be on the runner.
      - name: Install XcodeGen + Pillow
        run: |
          brew install xcodegen
          python3 -m pip install --quiet --break-system-packages Pillow

      - uses: oras-project/setup-oras@v1

      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa

      - name: Release
        id: rel
        working-directory: swift # salpa.yaml + project.yml live here (dmg lands here too)
        env:
          # salpa imports the Developer ID cert into an ephemeral keychain
          # itself (build.sign in salpa.yaml); the workflow only passes secrets.
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION=$(salpa version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"
          salpa --version "$VERSION" build    # keychain → xcodebuild → codesign → dmg → notarize → staple
          salpa --version "$VERSION" publish  # gh release (tag) + Soroban-$VERSION.dmg + versionless Soroban.dmg

      - name: Upload artifact (run-scoped copy)
        uses: actions/upload-artifact@v7
        with:
          name: Soroban-${{ steps.rel.outputs.version }}.dmg
          path: swift/Soroban-${{ steps.rel.outputs.version }}.dmg

  # macOS ships from the signed/notarized DMG above; the Rust/iced app (rust/gui)
  # gives us Linux + Windows on both arches. These build AFTER the release exists
  # (needs: release) and attach directly to its tag — versionless names with
  # --clobber, matching the DMG's stable latest-download convention, so
  # releases/latest/download/soroban-gui-<name> is a durable link.
  #
  # ADDITIVE + non-blocking: `release` does NOT depend on this job, so the DMG
  # release always publishes even if a desktop target fails to build. Build steps
  # mirror the PR-tested rust-gui-build.yml — keep the two in sync. rime is a
  # public sibling repo (rust/gui depends on it by ../../../rime/rime path).
  desktop:
    name: Desktop binary — ${{ matrix.name }}
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64, os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { name: linux-arm64, os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { name: windows-x86_64, os: windows-latest, target: x86_64-pc-windows-msvc }
          - { name: windows-arm64, os: windows-11-arm, target: aarch64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }} # gh release upload
    steps:
      # Both repos as siblings so rust/gui's ../../../rime/rime path resolves.
      - name: Check out soroban
        uses: actions/checkout@v5
        with:
          path: soroban
      - name: Check out rime (sibling)
        uses: actions/checkout@v5
        with:
          repository: alleato-llc/rime # public — the default token can read it
          path: rime

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban/rust/gui
          key: release-${{ matrix.target }}

      - name: Linux windowing deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev

      - name: Build (release)
        working-directory: soroban/rust/gui
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Attach to the GitHub Release
        shell: bash
        working-directory: soroban/rust/gui
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Windows" ]; then
            asset="soroban-gui-${{ matrix.name }}.exe"
            cp "target/${{ matrix.target }}/release/soroban-gui.exe" "$asset"
          else
            asset="soroban-gui-${{ matrix.name }}"
            cp "target/${{ matrix.target }}/release/soroban-gui" "$asset"
          fi
          gh release upload "v${{ needs.release.outputs.version }}" "$asset" \
            --clobber --repo "${{ github.repository }}"
