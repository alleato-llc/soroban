name: Deploy site

# The landing page (site/) + the Living Specification / test report (generated
# from the engine's Gherkin suite) deploy to the site host (soroban.alleato.dev).
# Decoupled from release.yml so a copy tweak ships without cutting an app release.
#
# salpa (pulled from ghcr) owns the deploy: `salpa deploy` builds site/ (npm)
# and publishes site/dist. We only regenerate the living spec/report first
# (it's a soroban-specific pre-step).
#
# Auth is short-lived OIDC credentials (no stored keys). AWS_SITE_ROLE_ARN is a
# SECRET, not a repo variable: GitHub auto-redacts secrets everywhere in logs,
# which a variable + a manual ::add-mask:: step does NOT do (the step's own
# `env:` block still gets echoed in its log preamble before the mask takes
# effect — that leaked the account id on every run here). Don't revert this to
# a variable no matter how it's masked downstream.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/ANZAN.md"
      - "swift/Engine/**" # spec/report are generated from the engine — keep them live
      - "spec/**" # …and from the shared Gherkin feature files
      - "bench/**" # the cross-engine perf report (perf.html) is generated from bench/
      - "scripts/generate_living_spec.py"
      - "scripts/generate_perf.py"
      - "salpa.yaml"
      - ".github/workflows/deploy-site.yml"
  # A new release on EITHER track (v* or rust-v*) redeploys the site so the
  # build-time download-link resolution (site/src/lib/releases.ts) picks up the
  # freshly published assets.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # assume the deploy role via OIDC
  contents: read
  packages: read # pull salpa from ghcr

concurrency:
  group: deploy-site
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    name: Deploy site (salpa)
    runs-on: macos-26 # needs Swift (regenerates spec/report) + Node (Astro build)
    steps:
      - uses: actions/checkout@v5

      # PickleKit (BDD generator for the living spec) needs Swift 6.2+.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      # The Rust toolchain is needed too: the living spec is Rust-rendered and
      # the Rust engine report runs on this same runner (pure logic, no GPU).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # Regenerates ALL three verification pages from the same spec/anzan
      # features — spec.html (Rust-rendered, engine-neutral), report.html
      # (Swift), rust-report.html (Rust) — so the published pages always match
      # the engines that built them. Must run BEFORE `salpa deploy` (its npm
      # build folds public/ into dist/).
      - name: Generate verification pages (living spec + both reports)
        run: python3 scripts/generate_living_spec.py

      # The cross-engine perf report (perf.html) — builds both engines in release
      # and measures. Same-box/same-run RELATIVE comparison; absolute numbers are
      # trend-only (the report and bench/README.md say so). This runner is shared
      # and noisy, so we don't gate on the numbers — we just publish them.
      - name: Generate performance report (Rust vs Swift engine)
        run: python3 scripts/generate_perf.py

      - uses: oras-project/setup-oras@v1

      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/${{ github.repository_owner }}/salpa:0.1.7
          chmod +x salpa-darwin-arm64
          sudo mv salpa-darwin-arm64 /usr/local/bin/salpa

      - name: Configure deploy credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SITE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        # GITHUB_TOKEN lifts the Releases-API rate limit for the build-time
        # download-link resolution (site/src/lib/releases.ts); the build falls
        # back to the Releases page if the lookup fails, so it's not required.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: salpa deploy # npm build site/ → publish dist
