name: Release (Rust)

# The RUST ecosystem's release track — independent of the Swift/macOS release
# (release.yml). Driven entirely by salpa (github.com/alleato-llc/salpa, the
# house release tool): salpa owns version → test → build → sign/notarize →
# publish, parameterized by rust/gui/salpa.yaml. The Rust/iced app (rust/gui) is
# cross-platform, so this fans out over a runner matrix; each leg pulls the
# salpa binary for ITS platform from ghcr and runs its own native salpa.
#
# Deliverables: a signed + notarized UNIVERSAL macOS DMG (Soroban-<ver>.dmg, one
# for every Mac) plus bare portable binaries for Linux and Windows
# (soroban-gui-<os>-<arch>[.exe]). Versioning is salpa's own rust-v* sequence
# (patch auto-bumped; #minor/#major in the head commit bumps bigger) — a
# separate namespace from the Swift track's v* tags, so they never collide.
#
# Trigger: push to main touching rust/** (the ecosystem) or spec/** (shared
# language behavior — a spec change releases BOTH ecosystems), plus a manual
# workflow_dispatch. Only these trusted contexts run — never a fork PR, where
# GitHub withholds secrets.
#
# rime is a public sibling repo (rust/gui depends on it by ../../../rime/rime).
#
# SECURITY (soroban is public; salpa is a PRIVATE repo):
#   - The private salpa binary is pulled from ghcr with ONLY the workflow
#     github.token + `packages: read` (the salpa package grants soroban read
#     access — no PAT, no custom secret). Nothing about salpa is exposed.
#   - The Apple signing secrets are least-privilege: they exist in `env:` ONLY
#     on the macOS job (the sole signer). The Linux/Windows legs never reference
#     them, so those runners never receive them. GitHub masks secret values in
#     logs; salpa itself references them only as shell vars (never echoes them).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/release-rust.yml"

permissions:
  contents: write # create the release + upload artifacts
  packages: read # pull the private salpa binary from ghcr

concurrency:
  group: release-rust
  cancel-in-progress: false

env:
  SALPA_VERSION: "0.1.11" # pinned salpa release on ghcr (bump deliberately)

jobs:
  # Correctness gate — salpa runs the workspace + gherkin parity suites (defined
  # in rust/gui/salpa.yaml). rust-ci.yml runs the full fmt/clippy/matrix
  # separately; here we just guard the release on the tests passing.
  test:
    name: Rust tests
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with: { path: soroban }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban/rust
      - uses: oras-project/setup-oras@v1
      - name: salpa test
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull "ghcr.io/${{ github.repository_owner }}/salpa:${SALPA_VERSION}"
          SALPA="$PWD/salpa-linux-amd64"; chmod +x "$SALPA"
          cd soroban/rust/gui && "$SALPA" test

  # Compute the next rust-v* version (salpa reads rust/gui/salpa.yaml for the
  # tag_prefix) and create the empty GitHub release once, so the parallel build
  # legs deterministically upload into it (no create race).
  version:
    name: Version + create release
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: soroban
          fetch-depth: 0 # rust-v* tags drive the version
      - uses: oras-project/setup-oras@v1
      - name: Compute version + init release
        id: v
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull "ghcr.io/${{ github.repository_owner }}/salpa:${SALPA_VERSION}"
          SALPA="$PWD/salpa-linux-amd64"; chmod +x "$SALPA"
          VERSION=$(cd soroban/rust/gui && "$SALPA" version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Rust release: rust-v$VERSION"
          # Idempotent empty release (already exists on a re-run → skip).
          if ! gh release view "rust-v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "rust-v$VERSION" \
              --repo "${{ github.repository }}" \
              --target "$GITHUB_SHA" \
              --title "Soroban (Rust) $VERSION" \
              --notes "Cross-platform Soroban desktop app (Rust/iced). macOS: a signed + notarized universal \`Soroban-$VERSION.dmg\` (one for every Mac). Linux/Windows: portable, unsigned \`soroban-gui-<os>-<arch>\` binaries. The Swift \`Soroban.dmg\` is the separate native-macOS track. See rust/CHANGELOG.md."
          fi

  # macOS leg (its own job so the Apple signing secrets are scoped HERE and
  # nowhere else). salpa builds a universal binary, bundles + hardened-runtime
  # codesigns Soroban.app, then dmg → notarize → staple, and publishes it.
  build-macos:
    name: macos-universal
    needs: [version]
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5
        with: { path: soroban }
      - uses: actions/checkout@v5
        with: { repository: alleato-llc/rime, path: rime } # sibling of soroban
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin # universal lipo
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban/rust/gui
          key: rust-release-macos
      - uses: oras-project/setup-oras@v1
      - name: salpa build + publish (signed, notarized)
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull "ghcr.io/${{ github.repository_owner }}/salpa:${SALPA_VERSION}"
          SALPA="$PWD/salpa-darwin-arm64"; chmod +x "$SALPA"
          cd soroban/rust/gui
          "$SALPA" --version "${{ needs.version.outputs.version }}" build
          "$SALPA" --version "${{ needs.version.outputs.version }}" publish
          # Stable cross-platform download alias for the landing page. GitHub has
          # ONE repo-wide "latest" release, so releases/latest/download is
          # unreliable per track (v* vs rust-v*); the site resolves this track's
          # tag via the Releases API and links this FIXED name. Soroban-cross.dmg
          # (universal) is distinct from the Swift track's native Soroban.dmg.
          VERSION="${{ needs.version.outputs.version }}"
          DMG=$(find . -name "Soroban-$VERSION.dmg" -type f | head -1)
          gh release upload "rust-v$VERSION" \
            "$DMG#Soroban-cross.dmg" \
            --repo "${{ github.repository }}" --clobber

  # Portable legs — Linux + Windows, three arches. NO signing secrets reach
  # these runners. salpa builds the bare binary named soroban-gui-<os>-<arch>
  # and publishes it into the same release.
  build-portable:
    name: ${{ matrix.name }}
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64, os: ubuntu-latest, salpa: salpa-linux-amd64 }
          - { name: linux-arm64, os: ubuntu-24.04-arm, salpa: salpa-linux-arm64 }
          - { name: windows-x86_64, os: windows-latest, salpa: salpa-windows-amd64.exe }
          - { name: windows-arm64, os: windows-11-arm, salpa: salpa-windows-arm64.exe }
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with: { path: soroban }
      - uses: actions/checkout@v5
        with: { repository: alleato-llc/rime, path: rime }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban/rust/gui
          key: rust-release-${{ matrix.name }}
      - name: Linux windowing deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev
      # oras publishes NO windows/arm64 CLI, so setup-oras can't bootstrap the
      # windows-11-arm leg. Windows on ARM runs x64 transparently, so install
      # the amd64 oras by hand there and let every other leg use the action.
      - uses: oras-project/setup-oras@v1
        if: matrix.name != 'windows-arm64'
      - name: Install oras (amd64, emulated) on windows-arm64
        if: matrix.name == 'windows-arm64'
        shell: pwsh
        run: |
          $ver = "1.2.0"
          Invoke-WebRequest -Uri "https://github.com/oras-project/oras/releases/download/v$ver/oras_${ver}_windows_amd64.zip" -OutFile oras.zip
          Expand-Archive -Path oras.zip -DestinationPath "$env:USERPROFILE\oras" -Force
          "$env:USERPROFILE\oras" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: salpa build + publish (bare binary)
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull "ghcr.io/${{ github.repository_owner }}/salpa:${SALPA_VERSION}"
          SALPA="$PWD/${{ matrix.salpa }}"; chmod +x "$SALPA" || true
          cd soroban/rust/gui
          "$SALPA" --version "${{ needs.version.outputs.version }}" build
          "$SALPA" --version "${{ needs.version.outputs.version }}" publish
          # Stable per-platform download alias for the landing page (drops the
          # -gui infix for a clean public name); the site links a fixed URL per
          # OS/arch and resolves this track's tag via the Releases API. Cargo's
          # output path is deterministic (gui has its own target/ dir).
          VERSION="${{ needs.version.outputs.version }}"
          EXT=""; case "${{ matrix.name }}" in windows-*) EXT=".exe";; esac
          BIN="target/release/soroban-gui$EXT"
          gh release upload "rust-v$VERSION" \
            "$BIN#soroban-${{ matrix.name }}$EXT" \
            --repo "${{ github.repository }}" --clobber
