name: Site CI

# The site's UI-automation loop: Playwright (chromium) drives the live REPL
# island — the "Live · try it" hero build — against the real static build
# (`npm run build && npm run preview`, via playwright.config.ts's webServer).
# Island WIRING only (hydration, menu bar, mode badge, panels, the carousel
# handoff); language behavior is covered by the three spec runners, never
# here. Uses the VENDORED wasm (site/src/wasm) on purpose — the smoke test
# is exactly what catches a broken or stale vendored binary.
on:
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site-ci.yml"

# One live run per ref — a newer push cancels the superseded run.
concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: playwright (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        working-directory: site
        run: npm ci
      - name: Install chromium
        working-directory: site
        run: npx playwright install chromium --with-deps
      - name: UI tests (the live REPL island)
        working-directory: site
        run: npm run test:ui
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7
