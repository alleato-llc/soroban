name: TS CI

# The TypeScript/WASM package's test loop: typecheck + vitest (binding
# surface) + the shared Gherkin suite (spec/anzan through cucumber-js — the
# THIRD parity runner, guarding the JS binding/marshalling layer). Unlike the
# site (which uses the VENDORED wasm in ts/wasm and site/src/wasm), this job
# builds the nodejs wasm itself so a rust/anzan change can never test against
# a stale binary — which is also why rust/anzan/** and rust/wasm/** are
# trigger paths here.
on:
  pull_request:
    paths:
      - "ts/**"
      - "rust/anzan/**"
      - "rust/wasm/**"
      - "spec/**"
      - ".github/workflows/ts-ci.yml"
  push:
    paths:
      - "ts/**"
      - "rust/anzan/**"
      - "rust/wasm/**"
      - "spec/**"
      - ".github/workflows/ts-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: npm test + spec (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - name: Install
        working-directory: ts
        run: npm ci
      - name: Build wasm (fresh — never test against a stale vendored binary)
        working-directory: ts
        run: npm run build:wasm
      - name: Typecheck
        working-directory: ts
        run: npm run typecheck
      - name: Build
        working-directory: ts
        run: npm run build
      - name: Unit tests (binding surface)
        working-directory: ts
        run: npm test
      - name: Shared spec (cucumber-js — the third parity runner)
        working-directory: ts
        run: npm run spec
