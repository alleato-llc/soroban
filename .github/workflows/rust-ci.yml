name: Rust CI

# The Rust ecosystem's test loop: fmt + clippy + unit tests + the shared
# Gherkin suite (spec/anzan through cucumber-rs — the parity oracle the Swift
# engine also runs, so spec/** changes trigger BOTH this and ci.yml).
# Two OSes deliberately: the anzan crate promises platform-independent
# results (pure-Rust libm at the via_double seam), and running Linux and
# macOS side by side keeps that claim honest.
on:
  pull_request:
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/rust-ci.yml"
  push:
    paths:
      - "rust/**"
      - "spec/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Gherkin parity suite (spec/anzan)
        run: cargo test --test gherkin -p anzan
