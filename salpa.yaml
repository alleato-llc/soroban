# Site deploy config for salpa (github.com/alleato-llc/salpa), run from the
# repo root by deploy-site.yml. The Swift app's release lifecycle (test/build/
# publish) lives in swift/salpa.yaml and runs with cwd=swift/ — each
# ecosystem's release config lives with its tree; the site is repo-level.
product: Soroban

deploy:
  source: site # npm build; sync site/dist
  bucket: soroban.alleato.dev # the site host
  invalidate: true # bust the CDN cache after deploy
